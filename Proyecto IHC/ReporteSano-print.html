    *, *::before, *::after { box-sizing: border-box; }

    html, body {

    }
    .cover-badges {
      display: flex; gap: 10px; flex-wrap: wrap;

    .cover-badge {

    }
    .print-section-desc {
      font-size: 11px; color: #5b6478; margin-left: auto;
    }

    .screens-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px 16px;
      align-items: start;

    .screen-print-slot {

    .screen-print-label {

      font-size: 9px; color: #5b6478; text-align: center;
      letter-spacing: 0.06em; text-transform: uppercase;

      transform-origin: top center;
      transform: scale(0.58);
      margin-bottom: -130px; /* compensate for scale */

    .rubric-print-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;

    .rubric-print-card {
      background: #f8f6f1;
      border-radius: 10px;
      padding: 12px 14px;
      break-inside: avoid;
      -webkit-print-color-adjust: exact;

    .kpi-card {

    .dash-card {
      background: #f8f6f1; border-radius: 10px; padding: 14px;

    }
    .dash-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .dash-table th {
      text-align: left; padding: 6px 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      color: #5b6478; text-transform: uppercase; letter-spacing: 0.08em;

    .total-score {

              <span className="print-section-num">02</span>
              <span className="print-section-title">Panel web de administración</span>
              <span className="print-section-desc">Dashboard para el ayuntamiento — admin.reporteciudad.gob.mx</span>
            </div>

            {/* KPIs */}
            <div className="dash-overview">
              {[
                {l:'Reportes hoy', v:'47', d:'+12 vs ayer', c:'#f59e0b'},
                {l:'Activos', v:'23', d:'3 urgentes', c:'#ef4444'},
                {l:'Resueltos (7d)', v:'124', d:'89% < 24h', c:'#22c55e'},
                {l:'Tiempo promedio', v:'2.1h', d:'-18 min', c:'#2563eb'},
              ].map((k,i)=>(
                <div key={i} className="kpi-card">
                  <div style={{ fontFamily:'JetBrains Mono, monospace', fontSize:9, color:'#5b6478', textTransform:'uppercase', letterSpacing:0.08 }}>{k.l}</div>
                  <div style={{ fontFamily:'Instrument Serif, serif', fontSize:32, color:k.c, marginTop:4, lineHeight:1 }}>{k.v}</div>
                  <div style={{ fontSize:10, color:'#5b6478', marginTop:2 }}>{k.d}</div>
                </div>
              ))}
            </div>

            <div className="dash-two-col" style={{ marginBottom: 14 }}>
              {/* Bar chart */}
              <div className="dash-card">
                <div style={{ fontFamily:'JetBrains Mono, monospace', fontSize:9, color:'#5b6478', textTransform:'uppercase', marginBottom:6 }}>Reportes por día · últimos 7 días</div>
                <svg width="100%" height="120" viewBox="0 0 520 120">
                  {[...Array(5)].map((_,i)=><line key={i} x1="0" y1={15+i*22} x2="520" y2={15+i*22} stroke="rgba(15,30,61,0.07)" strokeDasharray="3 4"/>)}
                  {['L','M','M','J','V','S','D'].map((d,i)=>{
                    const x=30+i*70; const h1=[60,72,52,84,92,44,68][i]; const h2=[44,56,40,64,76,36,60][i];
                    return <g key={i}>
                      <rect x={x} y={110-h1} width="17" height={h1} rx="3" fill="#0f1e3d"/>
                      <rect x={x+20} y={110-h2} width="17" height={h2} rx="3" fill="#34d399"/>
                      <text x={x+18} y="118" textAnchor="middle" fontSize="8" fill="#5b6478">{d}</text>
                    </g>;
                  })}
                </svg>
                <div style={{ display:'flex', gap:16, marginTop:6, fontSize:10, color:'#5b6478' }}>
                  <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}><span style={{ width:8,height:8,borderRadius:2,background:'#0f1e3d' }}/>Recibidos</span>
                  <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}><span style={{ width:8,height:8,borderRadius:2,background:'#34d399' }}/>Resueltos</span>
                </div>
              </div>
              {/* Categories donut-like breakdown */}
              <div className="dash-card">
                <div style={{ fontFamily:'JetBrains Mono, monospace', fontSize:9, color:'#5b6478', textTransform:'uppercase', marginBottom:10 }}>Por categoría</div>
                {[
                  {type:'bache',    label:'Baches',    n:18, c:'#7c3aed'},
                  {type:'basura',   label:'Basura',    n:12, c:'#65a30d'},
                  {type:'alumbrado',label:'Alumbrado', n:9,  c:'#eab308'},
                  {type:'agua',     label:'Fuga agua', n:6,  c:'#0ea5e9'},
                  {type:'drenaje',  label:'Drenaje',   n:4,  c:'#0891b2'},
                  {type:'grafiti',  label:'Grafiti',   n:3,  c:'#db2777'},
                ].map((cat,i)=>(
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:8, padding:'4px 0', borderTop:i>0?'1px solid rgba(15,30,61,0.06)':'none' }}>
                    <span style={{ width:8,height:8,borderRadius:99,background:cat.c,flexShrink:0 }}/>
                    <span style={{ flex:1, fontSize:11, color:'#2a3348', fontWeight:500 }}>{cat.label}</span>
                    <span style={{ fontFamily:'JetBrains Mono, monospace', fontSize:11, color:cat.c, fontWeight:700 }}>{cat.n}</span>
                    <div style={{ width:60, height:4, borderRadius:2, background:'rgba(15,30,61,0.07)', overflow:'hidden' }}>
                      <div style={{ width:`${Math.round(cat.n/52*100)}%`, height:'100%', background:cat.c, borderRadius:2 }}/>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Table */}
            <div className="dash-card" style={{ padding: 0, overflow: 'hidden' }}>
              <div style={{ padding:'10px 14px', borderBottom:'1px solid rgba(15,30,61,0.08)' }}>
                <div style={{ fontFamily:'JetBrains Mono, monospace', fontSize:9, color:'#5b6478', textTransform:'uppercase' }}>Cola de atención</div>
                <div style={{ fontFamily:'Instrument Serif, serif', fontSize:18 }}>Reportes recientes</div>
              </div>
              <table className="dash-table">
                <thead>
                  <tr><th>ID</th><th>Tipo</th><th>Descripción</th><th>Ubicación</th><th>Severidad</th><th>Votos</th><th>Estado</th><th>Hora</th></tr>
                </thead>
                <tbody>
                  {[
                    {id:'R-2847',type:'bache',    title:'Bache grande sobre Av. Reforma',   loc:'Reforma esq. 5 de Mayo', sev:'high',   v:8,  st:'assigned',  t:'10:14'},
                    {id:'R-2846',type:'basura',   title:'Basura acumulada en esquina',       loc:'Calle Morelos 148',      sev:'medium', v:4,  st:'assigned',  t:'09:58'},
                    {id:'R-2845',type:'alumbrado',title:'Lámpara fundida',                  loc:'Parque Hidalgo',         sev:'low',    v:2,  st:'pending',   t:'09:41'},
                    {id:'R-2844',type:'agua',     title:'Fuga de agua en banqueta',          loc:'Av. Juárez 22',          sev:'high',   v:12, st:'confirmed', t:'09:22'},
                    {id:'R-2843',type:'drenaje',  title:'Coladera tapada',                  loc:'Calle Allende',          sev:'low',    v:1,  st:'resolved',  t:'ayer'},
                  ].map((r,i)=>{
                    const tc={bache:'#7c3aed',agua:'#0ea5e9',basura:'#65a30d',alumbrado:'#eab308',drenaje:'#0891b2',grafiti:'#db2777'}[r.type];
                    const sc={high:{bg:'#fee2e2',c:'#b91c1c',l:'Alto'},medium:{bg:'#fef7ed',c:'#d97706',l:'Medio'},low:{bg:'#dcfce7',c:'#15803d',l:'Bajo'}}[r.sev];
                    const stc={pending:{c:'#6b7280',l:'Recibido'},confirmed:{c:'#d97706',l:'Confirmado'},assigned:{c:'#2563eb',l:'En camino'},resolved:{c:'#15803d',l:'Resuelto'}}[r.st];
                    return (
                      <tr key={i}>
                        <td style={{ fontFamily:'JetBrains Mono, monospace', fontWeight:600 }}>{r.id}</td>
                        <td style={{ color:tc, fontWeight:600 }}>{{ bache:'Bache', agua:'Fuga agua', basura:'Basura', alumbrado:'Alumbrado', drenaje:'Drenaje' }[r.type]}</td>
                        <td style={{ fontWeight:500 }}>{r.title}</td>
                        <td style={{ color:'#5b6478' }}>{r.loc}</td>
                        <td><span style={{ padding:'2px 7px', borderRadius:999, background:sc.bg, color:sc.c, fontSize:10, fontWeight:700 }}>{sc.l}</span></td>
                        <td style={{ fontWeight:700 }}>{r.v}</td>
                        <td><span style={{ color:stc.c, fontWeight:600 }}>{stc.l}</span></td>
                        <td style={{ color:'#5b6478' }}>{r.t}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* ── Page 6: Rubric part 1 (cats 1–5) ── */}
          <div className="page">
            <div className="print-section-head">
              <span className="print-section-num">03</span>
              <span className="print-section-title">Cumplimiento de rúbrica · 1/2</span>
              <span className="print-section-desc">Navegación, Interacción, Visualización, Eficiencia, UX</span>
            </div>
            <div className="rubric-print-grid">
              {rubricData.slice(0,5).map((cat,ci)=>{
                const catSum = cat.items.reduce((a,b)=>a+b.s,0);
                const catMax = cat.items.length*2;
                return (
                  <div key={ci} className="rubric-print-card">
                    <div className="rubric-card-head">
                      <span style={{ fontSize:18 }}>{cat.icon}</span>
                      <span style={{ fontFamily:'Instrument Serif, serif', fontSize:18, color:'#0f1e3d' }}>{cat.cat}</span>
                      <span className="score-badge">{catSum}/{catMax}</span>
                    </div>
                    {cat.items.map((it,j)=>(
                      <div key={j} className="rubric-row">
                        <span className="rubric-chip" style={{ background:chipColor(it.s) }}>{chipChar(it.s)}</span>
                        <div>
                          <div style={{ fontWeight:600, color:'#0a1530', lineHeight:1.3 }}>{it.c}</div>
                          <div style={{ color:'#5b6478', fontSize:10, marginTop:2, lineHeight:1.4 }}>{it.note}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── Page 7: Rubric part 2 (cats 6–10) + total ── */}
          <div className="page">
            <div className="print-section-head">
              <span className="print-section-num">03</span>
              <span className="print-section-title">Cumplimiento de rúbrica · 2/2</span>
              <span className="print-section-desc">UI, Responsividad, Búsqueda, Feedback, Accesibilidad</span>
            </div>
            <div className="rubric-print-grid">
              {rubricData.slice(5).map((cat,ci)=>{
                const catSum = cat.items.reduce((a,b)=>a+b.s,0);
                const catMax = cat.items.length*2;
                return (
                  <div key={ci} className="rubric-print-card">
                    <div className="rubric-card-head">
                      <span style={{ fontSize:18 }}>{cat.icon}</span>
                      <span style={{ fontFamily:'Instrument Serif, serif', fontSize:18, color:'#0f1e3d' }}>{cat.cat}</span>
                      <span className="score-badge">{catSum}/{catMax}</span>
                    </div>
                    {cat.items.map((it,j)=>(
                      <div key={j} className="rubric-row">
                        <span className="rubric-chip" style={{ background:chipColor(it.s) }}>{chipChar(it.s)}</span>
                        <div>
                          <div style={{ fontWeight:600, color:'#0a1530', lineHeight:1.3 }}>{it.c}</div>
                          <div style={{ color:'#5b6478', fontSize:10, marginTop:2, lineHeight:1.4 }}>{it.note}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}

              {/* Total score card */}
              <div className="total-score" style={{ display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center' }}>
                <div style={{ fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'rgba(255,255,255,0.5)', textTransform:'uppercase', letterSpacing:0.1, marginBottom:8 }}>Puntaje total</div>
                <div style={{ fontFamily:'Instrument Serif, serif', fontSize:60, lineHeight:1, color:'#34d399' }}>{total}</div>
                <div style={{ fontSize:14, color:'rgba(255,255,255,0.6)', marginTop:4 }}>de {max} puntos posibles</div>
                <div style={{ marginTop:12, fontSize:22, fontFamily:'Instrument Serif, serif', color:'#fff' }}>{Math.round(total/max*100)}% cobertura</div>
                <div style={{ marginTop:16, fontSize:11, color:'rgba(255,255,255,0.5)', lineHeight:1.5, textAlign:'center', maxWidth:200 }}>
                  Todos los criterios evaluados con ☑ Sí (2) — diseño cumple la rúbrica completa.
                </div>
              </div>
            </div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp/>);

    // Auto-print after everything is ready
    document.fonts.ready.then(() => {
      setTimeout(() => window.print(), 500);
    });
  </script>
</body>
</html>
